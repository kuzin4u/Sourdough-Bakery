services:
  - type: web
    name: sourdough-bakery-bot-python
    runtime: python
    plan: starter # на free-плане сервис "засыпает" после 15 мин простоя — тормозит Telegram и синхронизацию корзины
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7" # render.yaml игнорирует runtime.txt при деплое через Blueprint — версия фиксируется здесь
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: "claude-haiku-4-5-20251001"
      - key: ADMIN_CHAT_ID
        sync: false
      - key: SHEETS_WEBHOOK_URL
        sync: false
      - key: BAKE_WEEKDAYS
        value: "2,4,6"
      - key: REVIEW_DELAY_HOURS
        value: "4"
      - key: PAYMENT_PROVIDER
        value: "yookassa" # или "yoomoney" — переключает провайдера без правки кода
      - key: YOOKASSA_SHOP_ID
        sync: false
      - key: YOOKASSA_SECRET_KEY
        sync: false
      - key: YOOMONEY_WALLET
        sync: false
      - key: YOOMONEY_NOTIFICATION_SECRET
        sync: false
      - key: RETURN_URL
        sync: false
      - key: USE_WEBHOOK
        value: "true" # на Starter/Free Web Service есть публичный адрес — webhook эффективнее polling
      # WEBHOOK_SECRET намеренно НЕ задаётся здесь: если оставить пустым, main.py сам
      # сгенерирует безопасный токен через secrets.token_urlsafe() при каждом старте —
      # это даёт только символы, допустимые для Telegram (буквы/цифры/-/_). Генерация
      # через generateValue в Render иногда даёт символы, которые Telegram отклоняет
      # с ошибкой "Secret token contains unallowed characters".
