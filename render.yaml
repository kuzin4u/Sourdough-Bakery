# Единый Blueprint для монорепозитория: бот + сайт в одном GitHub-репозитории.
# Положите этот файл В КОРЕНЬ репозитория (рядом с папками telegram-bot-python/
# и website/, НЕ внутри них). Render найдёт его автоматически при New → Blueprint
# и создаст оба сервиса разом, каждый из своей подпапки (rootDir).
#
# Если используете Node-версию бота вместо Python — замените блок sourdough-bakery-bot
# на содержимое telegram-bot-node/render.yaml (с поправкой rootDir на telegram-bot-node).

services:
  # ---------------- TELEGRAM-БОТ (Python) ----------------
  - type: web
    name: sourdough-bakery-bot
    runtime: python
    rootDir: telegram-bot-python   # ключевая строка: говорит Render, из какой папки собирать
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: "claude-haiku-4-5-20251001"
      - key: ADMIN_CHAT_ID
        sync: false
      - key: SHEETS_WEBHOOK_URL
        sync: false
      - key: BAKE_WEEKDAYS
        value: "2,4,6"
      - key: REVIEW_DELAY_HOURS
        value: "4"
      # --- Онлайн-оплата ---
      # PAYMENT_PROVIDER переключает провайдера: "yookassa" (по умолчанию) или "yoomoney".
      # Можно заполнить оба блока переменных — используется только тот, что указан здесь.
      - key: PAYMENT_PROVIDER
        value: "yookassa"
      # ЮKassa
      - key: YOOKASSA_SHOP_ID
        sync: false
      - key: YOOKASSA_SECRET_KEY
        sync: false
      # ЮMoney (физлицо, без shop_id)
      # YOOMONEY_WALLET — номер кошелька (например 410011234567890)
      # YOOMONEY_NOTIFICATION_SECRET — секрет из yoomoney.ru → Настройки → Для разработчиков
      - key: YOOMONEY_WALLET
        sync: false
      - key: YOOMONEY_NOTIFICATION_SECRET
        sync: false
      - key: RETURN_URL
        sync: false
      - key: USE_WEBHOOK
        value: "true"
      # WEBHOOK_SECRET намеренно НЕ задаётся здесь: если оставить пустым, main.py сам
      # сгенерирует безопасный токен через secrets.token_urlsafe() при каждом старте —
      # это даёт только символы, допустимые для Telegram (буквы/цифры/-/_). Генерация
      # через generateValue в Render иногда даёт символы, которые Telegram отклоняет
      # с ошибкой "Secret token contains unallowed characters".

  # ---------------- САЙТ (Static Site) ----------------
  - type: web
    name: sourdough-bakery-website
    runtime: static
    rootDir: website                # ключевая строка: собирается из подпапки website/
    buildCommand: bash build.sh
    staticPublishPath: .
    envVars:
      # property: host отдаёт только "слаг" сервиса бота (например sourdough-bakery-bot),
      # а не полный публичный адрес — hostport для этого НЕ подходит, он предназначен
      # только для приватной сети между сервисами Render, недоступен из браузера
      # посетителя сайта. Полный https-адрес build.sh собирает сам из этого слага.
      - key: BOT_HOST
        fromService:
          type: web
          name: sourdough-bakery-bot
          property: host
